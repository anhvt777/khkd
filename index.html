<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>KPI Engine - PGD Đường 9</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>:root{--brand:#006B68;--b2:#008C82;--gold:#FFC62F;--bg:#f5f8f8;--line:#dbe4e8;--text:#0f172a;--muted:#64748b;--good:#047857;--bad:#b91c1c;--warn:#b45309}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}header{position:sticky;top:0;z-index:9;background:linear-gradient(110deg,var(--brand),var(--b2));color:#fff;box-shadow:0 8px 24px #0002}.wrap{max-width:1440px;margin:auto;padding:0 14px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 0;flex-wrap:wrap}.brand{display:flex;gap:10px;align-items:center;font-weight:850;white-space:nowrap}.brand img{height:30px;background:#fff;border-radius:8px;padding:3px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid #ffffff66;background:#ffffff18;color:#fff;border-radius:999px;padding:9px 13px;cursor:pointer;font-weight:800}.tab.on{background:#fff;color:var(--brand)}main{padding:16px 0 36px}.grid{display:grid;gap:14px}.g4{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:360px 1fr}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:0 8px 22px #0f172a12}h2,h3{margin:.1rem 0 .6rem}.muted,.small{color:var(--muted)}.small{font-size:12px}.val{font-size:25px;font-weight:900}.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin:0 0 12px}input,select,button{font:inherit}input,select{border:1px solid var(--line);border-radius:11px;padding:8px 10px;background:#fff;min-width:90px}button,.btnlike{border:1px solid var(--line);border-radius:11px;padding:8px 11px;background:#fff;cursor:pointer;font-weight:750;display:inline-flex;align-items:center;gap:6px}button.primary{background:var(--brand);border-color:var(--brand);color:#fff}button.warn{background:var(--gold)}button.danger{color:var(--bad);border-color:#fecaca;background:#fff5f5}.table{overflow:auto;border:1px solid var(--line);border-radius:15px;background:#fff;max-height:68vh}table{width:100%;border-collapse:separate;border-spacing:0;min-width:1100px}th,td{border-bottom:1px solid var(--line);padding:8px 9px;text-align:left;vertical-align:middle}th{position:sticky;top:0;background:#f8fafc;font-size:12px;text-transform:uppercase;color:#334155;z-index:1}td.num,th.num{text-align:right}td input,td select{width:100%}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:12px;border:1px solid var(--line);white-space:nowrap}.good{background:#ecfdf5;border-color:#bbf7d0;color:var(--good)}.bad{background:#fef2f2;border-color:#fecaca;color:var(--bad)}.warnp{background:#fffbeb;border-color:#fde68a;color:var(--warn)}.notice{border-left:4px solid var(--gold);background:#fffbeb;border-radius:12px;padding:10px 12px;color:#513700;margin:8px 0 12px}@media(max-width:1000px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.tabs{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;max-width:100%}.tab{white-space:nowrap}}@media(max-width:640px){.wrap{padding:0 10px}.top{align-items:flex-start}.g4{grid-template-columns:1fr}.brand img{display:none}.brand{font-size:14px}.card{padding:12px;border-radius:15px}.val{font-size:22px}.toolbar{gap:7px}.toolbar button,.toolbar .btnlike,.toolbar select{flex:1 1 auto}.table{max-height:66vh}table{min-width:980px}input,select,button,.btnlike{font-size:14px}}</style></head><body><header><div class="wrap top"><div class="brand"><img src="./bidv_logo.png" onerror="this.style.display='none'">KPI Engine - PGD Đường 9</div><nav class="tabs" id="tabs"></nav></div></header><main class="wrap" id="app"><div class="card">Đang tải dữ liệu KPI...</div></main><script src="./kpi-app-v7.js?v=7.1"></script></body></html>
